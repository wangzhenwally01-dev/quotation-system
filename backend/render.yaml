services:
  - type: web
    name: quotation-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_INIT_PASSWORD
        value: admin123
      - key: DATABASE_PATH
        value: /data/quotation.db
      - key: H5_BASE_URL
        fromService:
          name: quotation-frontend
          envVarKey: APP_URL
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
